<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Consultation</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="booking"id="contact">

    <h2>Book Your Consultation</h2>

    <form action="https://formspree.io/f/mrejeezl" method="POST">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="text" name="company" placeholder="Company Name">
    <input type="tel" name="phone" placeholder="WhatsApp Number" required>
    <input type="email" name="email" placeholder="Email" required>

    <input type="hidden" name="_subject" value="New Booking from Website">

    <select name="mode" required>
        <option value="">Select Mode</option>
        <option>Online</option>
        <option>Offline</option>
    </select>

    <input type="date" name="date" required>

    <select name="duration" required>
        <option value="">Select Duration</option>
        <option>30 Minutes</option>
        <option>60 Minutes</option>
    </select>

    <button type="submit" class="green">Book Now</button>

</form>

</section>

</body>
</html>
